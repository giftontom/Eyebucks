# Eyebuckz LMS - Supabase Configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5173", "https://eyebuckz.com", "https://eyebuckz.com/**", "https://www.eyebuckz.com", "https://www.eyebuckz.com/**", "https://dev.eyebuckz.com", "https://dev.eyebuckz.com/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""  # Auto-generated by Supabase

[auth.email]
enable_signup = false  # Only Google OAuth for now
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

[analytics]
enabled = false

[functions.checkout-create-order]
verify_jwt = true

[functions.checkout-verify]
verify_jwt = true

[functions.checkout-webhook]
verify_jwt = false  # Webhooks come from Razorpay, no JWT

[functions.video-signed-url]
verify_jwt = true

[functions.admin-video-upload]
verify_jwt = true

[functions.certificate-generate]
verify_jwt = true

[functions.progress-complete]
verify_jwt = true
