<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eyebuckz - Coming Soon</title>
  <meta name="description" content="Eyebuckz - Your Learning Management System. Coming soon.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f8fafc;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 1.25rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid #f59e0b;
      border-radius: 9999px;
      color: #f59e0b;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #f59e0b, #f97316);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    .message {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.8;
    }

    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.08), transparent 70%);
      pointer-events: none;
    }

    .glow-1 { top: -100px; right: -100px; }
    .glow-2 { bottom: -100px; left: -100px; }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <h1 class="logo">Eyebuckz</h1>
    <p class="tagline">A smarter way to learn. We're building something great.</p>
    <div class="divider"></div>
    <p class="message">We're putting the finishing touches on our learning platform.<br>Stay tuned — something exciting is on the way.</p>
  </div>
</body>
</html>
