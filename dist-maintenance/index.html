<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eyebuckz — Under Construction</title>
  <meta name="description" content="Eyebuckz is under construction. We're crafting something cinematic — a filmmaking LMS to help you film like a master.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(239, 68, 68, 0.07);
      top: -120px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px;
      height: 350px;
      background: rgba(220, 38, 38, 0.06);
      bottom: -100px;
      left: -80px;
      animation: float 10s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 250px;
      height: 250px;
      background: rgba(239, 68, 68, 0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float 12s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes sprocketSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container {
      max-width: 560px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s ease-out both;
    }

    /* Film strip decorations */
    .film-strip {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .film-frame {
      width: 32px;
      height: 24px;
      border: 2px solid rgba(239, 68, 68, 0.3);
      border-radius: 3px;
      position: relative;
      background: rgba(239, 68, 68, 0.05);
    }
    .film-frame::before,
    .film-frame::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 1px;
      background: rgba(239, 68, 68, 0.3);
    }
    .film-frame::before { top: -6px; left: 50%; transform: translateX(-50%); }
    .film-frame::after { bottom: -6px; left: 50%; transform: translateX(-50%); }
    .film-frame:nth-child(3) {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.5);
    }

    /* Logo */
    .logo {
      margin-bottom: 1.75rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .logo svg {
      width: 200px;
      height: auto;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 50px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #ef4444;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease-out 0.3s both, pulse 3s ease-in-out infinite;
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Sprocket icon (camera reel) */
    .sprocket {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #ef4444;
      border-radius: 50%;
      position: relative;
      animation: sprocketSpin 8s linear infinite;
    }
    .sprocket::before {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .tagline {
      font-size: 1.2rem;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .subtext {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 3px;
      margin: 1.75rem auto;
      border-radius: 2px;
      background: linear-gradient(90deg, #ef4444, #dc2626);
      background-size: 200% auto;
      animation: fadeInUp 0.8s ease-out 0.55s both, shimmer 3s linear infinite;
    }

    /* Clapperboard decoration */
    .clapperboard {
      display: flex;
      justify-content: center;
      margin-top: 2.5rem;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }
    .clap {
      width: 48px;
      height: 36px;
      border: 2px solid rgba(239, 68, 68, 0.2);
      border-radius: 4px;
      position: relative;
      background: rgba(239, 68, 68, 0.03);
    }
    .clap::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -2px;
      right: -2px;
      height: 10px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(239, 68, 68, 0.2),
        rgba(239, 68, 68, 0.2) 4px,
        transparent 4px,
        transparent 8px
      );
      border-radius: 3px 3px 0 0;
      border: 2px solid rgba(239, 68, 68, 0.2);
      border-bottom: none;
    }
    .clap-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 1px;
      background: rgba(239, 68, 68, 0.15);
    }
    .clap-line:nth-child(1) { top: 8px; }
    .clap-line:nth-child(2) { top: 16px; }
    .clap-line:nth-child(3) { top: 24px; }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 1.5rem; }
      h1 { font-size: 1.75rem; }
      .tagline { font-size: 1.05rem; }
      .subtext { font-size: 0.85rem; }
      .logo svg { width: 160px; }
      .film-frame { width: 24px; height: 18px; }
      .orb-1 { width: 250px; height: 250px; }
      .orb-2 { width: 200px; height: 200px; }
    }
  </style>
</head>

  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
